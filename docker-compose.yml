services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  worker:
    build: .
    command: celery -A backend.celery_app worker --loglevel=info --pool=solo
    env_file: .env
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE=http://host.docker.internal:11434
    volumes:
      - downloaded_papers:/app/downloaded_papers
    depends_on:
      redis:
        condition: service_healthy

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE=http://host.docker.internal:11434
    volumes:
      - downloaded_papers:/app/downloaded_papers
    depends_on:
      redis:
        condition: service_healthy

volumes:
  qdrant_data:
  downloaded_papers:
